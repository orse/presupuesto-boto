<html lang="es"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presupuesto Familiar</title>
<style>

*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f5f7;--sf:#fff;--sf2:#f9f9fb;--sf3:#ebebed;
  --tx:#1d1d1f;--tx2:#6e6e73;--tx3:#aeaeb2;
  --bd:#d2d2d7;--bd2:#b0b0b5;
  --blue:#0071e3;--blue-d:#0058b0;--blue-bg:#e8f0fb;
  --green:#28a745;--green-bg:#e6f6eb;
  --red:#ff3b30;--red-bg:#fff0ef;
  --orange:#ff9500;--yellow:#ffcc00;--yellow-bg:#fffbe6;
  --teal:#32ade6;--teal-bg:#e5f5fd;
  --purple:#af52de;--purple-bg:#f5edfc;
  --r:10px;--rl:14px;--rxl:20px;
  --sh:0 1px 4px rgba(0,0,0,.07),0 2px 8px rgba(0,0,0,.04);
  --sh2:0 4px 16px rgba(0,0,0,.1),0 2px 6px rgba(0,0,0,.05);
}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Inter",system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased}
input,select,textarea{font-family:inherit;font-size:15px;background:var(--sf);border:1.5px solid var(--bd);border-radius:var(--r);color:var(--tx);padding:10px 13px;width:100%;outline:none;transition:border-color .18s,box-shadow .18s;min-height:44px}
input:focus,select:focus,textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(0,113,227,.15)}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
textarea{min-height:36px;resize:none;line-height:1.4}
button{font-family:inherit;cursor:pointer;font-size:15px;font-weight:500}
.btn{background:var(--blue);color:#fff;border:none;border-radius:var(--r);padding:11px 20px;font-weight:600;font-size:15px;transition:background .18s;min-height:44px}
.btn:hover{background:var(--blue-d)}
.btn:active{opacity:.9}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-sm{padding:8px 16px;font-size:14px;min-height:36px}
.btn-g{background:transparent;border:1.5px solid var(--bd);color:var(--tx2);border-radius:var(--r);padding:10px 16px;font-size:15px;transition:all .18s;min-height:44px}
.btn-g:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-bg)}
.btn-g.active{background:var(--blue-bg);color:var(--blue);border-color:var(--blue);font-weight:600}
.btn-g.sm{padding:7px 14px;font-size:14px;min-height:36px}
.btn-g.red{border-color:#fca5a5;color:var(--red)}
.btn-g.red:hover{background:var(--red-bg);border-color:var(--red)}
.btn-del{background:transparent;border:none;color:var(--tx3);font-size:20px;min-width:36px;min-height:36px;border-radius:8px;transition:color .15s}
.btn-del:hover{color:var(--red)}
.card{background:var(--sf);border-radius:var(--rl);padding:1.25rem 1.5rem;border:1px solid var(--bd);box-shadow:var(--sh)}
.stitle{font-size:11px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:10px}
.pt{font-size:22px;font-weight:700;color:var(--tx);letter-spacing:-.3px}
.tab-btn{background:transparent;border:none;color:var(--tx3);padding:9px 18px;border-radius:var(--r);font-size:15px;white-space:nowrap;font-weight:500;transition:all .18s;min-height:44px}
.tab-btn:hover{color:var(--tx2);background:var(--sf3)}
.tab-btn.active{background:var(--sf);color:var(--blue);font-weight:600;border:1.5px solid var(--bd);box-shadow:var(--sh)}
.hdr{background:rgba(255,255,255,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:10;box-shadow:var(--sh)}
.hdr-top{padding:10px 28px;display:flex;align-items:center;justify-content:space-between}
.nav{padding:4px 22px 8px;display:flex;gap:4px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.main{max-width:1160px;margin:0 auto;padding:28px 20px;padding-bottom:96px}
.av{border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}
.bar-bg{height:7px;background:var(--sf3);border-radius:4px;overflow:hidden;margin-top:6px}
.bar-fill{height:100%;border-radius:4px;transition:width .4s ease}
.toast{position:fixed;bottom:24px;right:24px;padding:13px 20px;border-radius:var(--rl);font-size:15px;font-weight:600;z-index:999;display:none;max-width:380px;box-shadow:var(--sh2)}
.sp{display:inline-block;width:15px;height:15px;border:2px solid rgba(0,113,227,.2);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
/* Login */
.lw{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1.5rem;background:var(--bg)}
.lc{background:var(--sf);border-radius:var(--rxl);padding:2.75rem;width:100%;max-width:400px;border:1px solid var(--bd);box-shadow:var(--sh2)}
.pb{background:var(--sf2);border:1.5px solid var(--bd);border-radius:var(--rl);padding:18px 14px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:8px;flex:1;transition:all .18s}
.pb:hover,.pb.sel{border-color:var(--blue);background:var(--blue-bg)}
.lbtn{background:transparent;border:none;color:var(--tx3);font-size:14px;margin-top:14px;width:100%;text-align:center;padding:6px;cursor:pointer;min-height:36px}
.lbtn:hover{color:var(--tx2)}
/* Budget */
.grp-card{margin-bottom:16px;border:1px solid var(--bd);border-radius:var(--rl);overflow:hidden;box-shadow:var(--sh)}
.grp-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:var(--sf2);cursor:pointer;user-select:none;border-bottom:1px solid var(--bd)}
.grp-hdr.collapsed{border-bottom:none}
.budget-tbl{width:100%;border-collapse:collapse}
.budget-tbl th{font-size:12px;color:var(--tx3);text-transform:uppercase;letter-spacing:.07em;padding:12px 14px;text-align:right;font-weight:700;background:var(--sf2);border-bottom:1.5px solid var(--bd)}
.budget-tbl th.lft{text-align:left}
.budget-tbl td{border-bottom:1px solid var(--bd);font-size:15px;vertical-align:middle}
.budget-tbl tr:last-child td{border-bottom:none}
.budget-tbl .tot-row td{font-weight:700;background:var(--sf2);padding:12px 14px;font-size:15px;border-top:1.5px solid var(--bd2)}
.ni{background:var(--sf2);border:1.5px solid var(--bd);border-radius:var(--r);color:var(--tx);padding:8px 10px;font-size:15px;font-family:inherit;text-align:right;width:100%;transition:all .18s;min-height:40px}
.ni:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(0,113,227,.12);outline:none;background:var(--sf)}
.note-i{background:transparent;border:none;border-bottom:1.5px dashed var(--bd2);border-radius:0;color:var(--tx3);padding:4px 6px;font-size:13px;font-style:italic;width:100%;resize:none;min-height:36px;outline:none}
.note-i:focus{border-color:var(--blue);color:var(--tx2)}
/* Transactions */
.tx-cols{display:grid;grid-template-columns:1fr 1fr;gap:18px}
@media(max-width:720px){.tx-cols{grid-template-columns:1fr}}
.tx-panel{background:var(--sf);border-radius:var(--rl);border:1px solid var(--bd);box-shadow:var(--sh);overflow:hidden}
.tx-ph{padding:14px 18px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;background:var(--sf2);flex-wrap:wrap;gap:8px}
.tx-body{padding:14px;max-height:600px;overflow-y:auto}
.tx-row{display:flex;flex-direction:column;padding:10px 13px;background:var(--sf2);border:1px solid var(--bd);border-radius:var(--r);margin-bottom:6px;font-size:14px;gap:0}
.tx-add{background:var(--sf2);border:1px solid var(--bd);border-radius:var(--rl);padding:16px;margin-bottom:12px}
.empty{text-align:center;padding:40px 16px;color:var(--tx3);font-size:15px;line-height:1.6}
/* Dashboard */
.dash-g{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:28px}
@media(max-width:800px){.dash-g{grid-template-columns:1fr}}
.dash-c{background:var(--sf);border-radius:var(--rl);border:1px solid var(--bd);box-shadow:var(--sh);overflow:hidden}
.dash-ch{padding:14px 18px;border-bottom:1px solid var(--bd);font-size:16px;font-weight:600;display:flex;align-items:center;gap:8px;background:var(--sf2)}
.dash-cb{padding:16px 18px}
.kpi{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--bd)}
.kpi:last-child{border-bottom:none}
.kpi-l{font-size:14px;color:var(--tx3)}
.kpi-v{font-size:17px;font-weight:700}
.brk-card{background:var(--sf);border-radius:var(--rl);border:1px solid var(--bd);box-shadow:var(--sh);margin-bottom:10px;overflow:hidden}
.brk-h{padding:11px 16px;background:var(--sf2);border-bottom:1px solid var(--bd);font-size:15px;font-weight:500;color:var(--tx2)}
.brk-b{padding:12px 16px;display:grid;gap:16px}
/* Advice */
.ab{background:var(--sf);border-radius:var(--rl);padding:1.75rem;border:1px solid var(--bd);line-height:1.75;box-shadow:var(--sh)}
.ab p{margin-bottom:12px;font-size:16px;color:var(--tx)}
/* Sticky balance bar */
.bal-bar{position:fixed;bottom:0;left:0;right:0;z-index:20;background:rgba(255,255,255,.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid var(--bd);box-shadow:0 -2px 12px rgba(0,0,0,.07)}
.bal-inner{max-width:1160px;margin:0 auto;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.bal-bar-static{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rl);box-shadow:var(--sh);margin-top:16px}
.bal-bar-static .bal-inner{padding:16px 20px}
/* Tooltip */
.info-b{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;background:var(--sf3);border:1.5px solid var(--bd2);color:var(--tx3);font-size:11px;font-weight:700;cursor:pointer;flex-shrink:0;margin-left:5px;font-family:serif;transition:all .15s}
.info-b:hover{background:var(--blue-bg);border-color:var(--blue);color:var(--blue)}
.tt{position:relative;display:inline-block}
.tt-box{display:none;position:absolute;z-index:999;top:calc(100% + 8px);left:50%;transform:translateX(-50%);background:#1d1d1f;color:#fff;border-radius:var(--rl);padding:13px 15px;font-size:13px;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.22);min-width:230px;pointer-events:none}
.tt-box::before{content:'';position:absolute;bottom:100%;left:50%;transform:translateX(-50%);border:6px solid transparent;border-bottom-color:#1d1d1f}
.tt:hover .tt-box{display:block}
/* Transaction note */
.tx-note{width:100%;margin-top:6px;padding:5px 8px;font-size:12px;font-family:inherit;background:transparent;border:none;border-bottom:1px dashed var(--bd2);border-radius:0;color:var(--tx2);resize:none;min-height:28px;outline:none;transition:border-color .15s;line-height:1.4}
.tx-note:focus{border-color:var(--blue);color:var(--tx)}
.tx-note::placeholder{color:var(--tx3);font-style:italic}
/* Loading */
#ls{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:14px;color:var(--tx2);background:var(--bg)}
.alert-w{background:var(--yellow-bg);border:1.5px solid var(--yellow);color:#7a5200;border-radius:var(--r);padding:11px 15px;font-size:15px;margin-bottom:14px}
.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600}
.b-cons{background:var(--teal-bg);color:var(--teal)}

/* ── Mobile responsive ─────────────────────────────────────────────────── */
.bal-bar-mob{display:none}
.bal-bar-desk{display:block}
.filter-btn-group{display:flex;gap:4px}
.filter-select{display:none}
@media(max-width:600px){
  .bal-bar-desk{display:none}
  .bal-bar-mob{display:block}
}
@media(max-width:600px){
  /* Global */
  body{font-size:15px}
  .main{padding:16px 12px;padding-bottom:20px}
  .hdr-top{padding:8px 14px}
  .nav{padding:4px 10px 8px}
  .tab-btn{padding:7px 11px;font-size:14px}
  .ph{margin-bottom:16px}
  .pt{font-size:18px}
  /* Budget */
  .grp-card{margin-bottom:12px}
  .grp-hdr{padding:12px 14px}
  .budget-tbl th,.budget-tbl td{font-size:13px}
  .ni{font-size:14px;padding:6px 8px;min-height:36px}
  .note-i{font-size:12px}
  /* Budget: on mobile, stack columns vertically instead of horizontal scroll */
  .budget-tbl{display:block}
  .budget-tbl thead{display:none} /* hide headers — label each cell inline */
  .budget-tbl tbody{display:block}
  .budget-tbl tr{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--bd);padding:8px 10px;gap:6px}
  .budget-tbl tr.tot-row{display:flex;justify-content:space-between;padding:10px 14px}
  .budget-tbl td{border:none;padding:4px 0 !important}
  .budget-tbl td:first-child{grid-column:1/-1;font-size:13px;font-weight:600;color:var(--tx);padding-bottom:6px !important}
  /* Transactions */
  .tx-cols{grid-template-columns:1fr}
  .filter-btn-group{display:none}
  .filter-select{display:block}
  .tx-row{padding:10px 12px}
  .tx-ph{flex-direction:column;align-items:flex-start;gap:8px}
  .tx-body{padding:10px;max-height:none}
  .cat-search{width:130px !important;min-width:0 !important}
  /* Sticky bar */
  .bal-inner{padding:10px 14px;gap:10px}
  .bal-bar .bal-inner > div:first-child{gap:12px}
  /* Disponible card */
  .disp-card-inner{flex-direction:column !important;gap:10px !important}
}
@media(max-width:480px){
  .tab-btn{padding:6px 8px;font-size:13px}
  .btn,.btn-g{font-size:14px;padding:9px 14px}
  .btn-sm,.btn-g.sm{font-size:13px;padding:6px 12px}
}
</style>
</head>

// ═══ FIRESTORE REST API ════════════════════════════════════════════════════
var FBP = "presupuesto-mensual-boto";
var FBK = "AIzaSyC_nR2dzNwrCvrJUrCeW4QlcYBuZ7bjON4";
var FBU = "https://firestore.googleapis.com/v1/projects/" + FBP + "/databases/(default)/documents/";

function fv(v) {
  if (!v) return null;
  if ("stringValue"  in v) return v.stringValue;
  if ("integerValue" in v) return Number(v.integerValue);
  if ("doubleValue"  in v) return v.doubleValue;
  if ("booleanValue" in v) return v.booleanValue;
  if ("nullValue"    in v) return null;
  if ("arrayValue"   in v) return (v.arrayValue.values || []).map(fv);
  if ("mapValue"     in v) {
    var o = {}, fs = v.mapValue.fields || {};
    Object.keys(fs).forEach(function(k) { o[k] = fv(fs[k]); });
    return o;
  }
  return null;
}

function tv(v) {
  if (v === null || v === undefined) return { nullValue: null };
  if (typeof v === "boolean") return { booleanValue: v };
  if (typeof v === "number") return Number.isInteger(v) ? { integerValue: String(v) } : { doubleValue: v };
  if (typeof v === "string") return { stringValue: v };
  if (Array.isArray(v)) return { arrayValue: { values: v.map(tv) } };
  if (typeof v === "object") {
    var fs = {};
    Object.keys(v).forEach(function(k) { fs[k] = tv(v[k]); });
    return { mapValue: { fields: fs } };
  }
  return { stringValue: String(v) };
}

function fbGet(col, id) {
  var url = FBU + col + "/" + encodeURIComponent(id) + "?key=" + FBK;
  return fetch(url).then(function(r) {
    if (r.status === 404) return null;
    return r.json();
  }).then(function(doc) {
    if (!doc || doc.error || !doc.fields) return null;
    var o = {};
    Object.keys(doc.fields).forEach(function(k) { o[k] = fv(doc.fields[k]); });
    return o;
  }).catch(function(e) { console.error("fbGet", col, id, e); return null; });
}

function fbSet(col, id, data) {
  var url = FBU + col + "/" + encodeURIComponent(id) + "?key=" + FBK;
  var fs = {};
  Object.keys(data).forEach(function(k) { fs[k] = tv(data[k]); });
  return fetch(url, {
    method: "PATCH",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ fields: fs })
  }).then(function(r) {
    if (!r.ok) return r.json().then(function(e) { console.error("fbSet err", e); });
  }).catch(function(e) { console.error("fbSet", e); });
}

function mk() { return S.selYear + "-" + String(S.selMonth + 1).padStart(2, "0"); }
function euro(n) { return new Intl.NumberFormat("es-ES", { style: "currency", currency: "EUR", minimumFractionDigits: 0 }).format(n || 0); }
function allUsers() { return Object.values(S.users); }
function getTx(uid) { return ((S.transactions[mk()] || {})[uid]) || []; }
function getBud(uid) { return ((S.budgets[mk()] || {})[uid]) || {}; }
function getNotes(uid) { return ((S.notes[mk()] || {})[uid]) || {}; }
function sumBG(uid, g) { return catsG(g).reduce(function(s, c) { return s + (+(getBud(uid)[c.id] || 0)); }, 0); }
function totBudSpend(uid) { return ["fixed","variable","leisure"].reduce(function(s, g) { return s + sumBG(uid, g); }, 0); }
// "Disponible para este mes" — shared field stored in budget shared doc
function getDisponible() {
  var m = mk();
  return (S.disponible && S.disponible[m]) ? +S.disponible[m] : 0;
}
// Income from transactions categorized as ingresos_mes (all users combined)
function ingresosMes() {
  var total = 0;
  allUsers().forEach(function(u) {
    getTx(u.id).forEach(function(t) {
      if (t.categoryId === "ingresos_mes" && !t.deleted && t.amount > 0) total += t.amount;
    });
  });
  return total;
}
// Total available = disponible field + ingresos_mes transactions
function totDisponible() { return getDisponible() + ingresosMes(); }
function totIncome(uid) { return sumBG(uid, "income"); } // kept for compat but unused
function totSpent(uid) {
  return getTx(uid).filter(function(t) { return t.categoryId && t.categoryId !== "ignorar" && !t.deleted && t.amount < 0; })
    .reduce(function(s, t) { return s + Math.abs(t.amount); }, 0);
}
function catSpent(uid, catId) {
  return getTx(uid).filter(function(t) { return t.categoryId === catId && t.categoryId !== "ignorar" && !t.deleted && t.amount < 0; })
    .reduce(function(s, t) { return s + Math.abs(t.amount); }, 0);
}

// ═══ TOAST ═════════════════════════════════════════════════════════════════
function toast(msg, ok) {
  if (ok === undefined) ok = true;
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.style.background = ok ? "#15803d" : "#b91c1c";
  t.style.color = "#fff";
  t.style.display = "block";
  clearTimeout(t._t);
  t._t = setTimeout(function() { t.style.display = "none"; }, 3500);
}

function loginHtml() {
  var us = allUsers();
  var err = S.loginErr ? "<div class=\"alert-w\">" + S.loginErr + "</div>" : "";
  var logo = "";

  if (S.loginMode === "login" && us.length > 0) {
    var btns = us.map(function(u) {
      var col = u.color || "#6366f1";
      var sel = S.loginSel === u.id ? " sel" : "";
      var photo = userPhoto(u);
      var avImg = photo
        ? "<img src=\"" + photo + "\" style=\"width:72px;height:72px;border-radius:50%;object-fit:cover;margin-bottom:4px;\" alt=\"" + esc(u.name) + "\">"
        : "<div class=\"av\" style=\"width:72px;height:72px;font-size:28px;background:" + col + "\">" + u.name[0].toUpperCase() + "</div>";
      return "<button class=\"pb" + sel + "\" onclick=\"selP('" + u.id + "')\">"
        + avImg
        + "<span style=\"font-size:14px;font-weight:600\">" + u.name + "</span></button>";
    }).join("");
    var pin = S.loginSel
      ? "<div style=\"margin-top:20px;margin-bottom:8px;font-size:13px;color:var(--tx3)\">PIN de " + (S.users[S.loginSel] ? S.users[S.loginSel].name : "") + "</div>"
        + "<input type=\"password\" maxlength=\"4\" id=\"pi\" autocomplete=\"off\" placeholder=\"&middot; &middot; &middot; &middot;\""
        + " style=\"letter-spacing:10px;font-size:22px;text-align:center;margin-bottom:12px\" onkeydown=\"if(event.key==='Enter')doLogin()\">"
        + "<button class=\"btn\" style=\"width:100%;padding:10px\" onclick=\"doLogin()\">Entrar</button>"
      : "";
    return "<div class=\"lw\"><div class=\"lc\">" + logo + err
      + "<div style=\"display:flex;gap:20px;margin-bottom:4px;justify-content:center\">" + btns + "</div>"
      + pin
      + "</div></div>";
  }
  // First run: create first profile
  return "<div class=\"lw\"><div class=\"lc\">" + logo + err
    + "<div style=\"font-size:13px;color:var(--tx3);margin-bottom:16px;text-align:center\">Crea tu perfil para empezar</div>"
    + "<input placeholder=\"Tu nombre\" id=\"rn\" autocomplete=\"off\" style=\"margin-bottom:10px\">"
    + "<input type=\"password\" maxlength=\"4\" id=\"rp\" autocomplete=\"off\" placeholder=\"PIN (4 digitos)\" style=\"margin-bottom:14px;letter-spacing:4px;text-align:center\">"
    + "<button class=\"btn\" style=\"width:100%;padding:10px\" onclick=\"doReg()\">Crear perfil</button>"
    + (us.length > 0 ? "<button class=\"lbtn\" onclick=\"toLg()\">&#8592; Volver</button>" : "")
    + "</div></div>";
}

window.selP = function(id) { S.loginSel = id; S.loginErr = ""; render(); setTimeout(function() { var e = document.getElementById("pi"); if (e) e.focus(); }, 60); };
window.toLg = function() { S.loginMode = "login"; S.loginErr = ""; render(); };
window.toReg = function() { S.loginMode = "register"; S.loginSel = ""; S.loginErr = ""; render(); };
window.doLogin = function() {
  var u = S.users[S.loginSel];
  if (!u) { S.loginErr = "Selecciona un perfil"; render(); return; }
  var pi = document.getElementById("pi");
  if (!pi || u.pin !== pi.value) { S.loginErr = "PIN incorrecto"; render(); return; }
  S.user = u; localStorage.setItem("bsess", u.id); render();
};
window.doReg = function() {
  var name = ((document.getElementById("rn") || {}).value || "").trim();
  var pin = ((document.getElementById("rp") || {}).value || "");
  if (!name) { S.loginErr = "Introduce un nombre"; render(); return; }
  if (pin.length !== 4) { S.loginErr = "El PIN debe tener 4 digitos"; render(); return; }
  var id = "u_" + Date.now();
  var pal = ["#6366f1","#007361","#0d9488","#f97316"];
  var u = { id: id, name: name, pin: pin, color: pal[Object.keys(S.users).length % pal.length] };
  S.users[id] = u; fbSet("budget", "users", S.users);
  S.user = u; localStorage.setItem("bsess", id); render();
};
window.logout = function() { localStorage.removeItem("bsess"); S.user = null; S.loginMode = "login"; S.loginSel = ""; S.loginErr = ""; render(); };

function evalExpr(raw) {
  // Allow simple arithmetic: 25+25, 100*3, 1000/4, 200-50
  var s = String(raw || "").trim();
  if (!s) return 0;
  if (/^[\d.]+$/.test(s)) return parseFloat(s) || 0;
  if (/^[\d.+\-*/\s()]+$/.test(s)) {
    try { var r = Function('"use strict";return(' + s + ')')(); return isFinite(r) ? Math.round(r * 100) / 100 : 0; } catch(e) { return parseFloat(s) || 0; }
  }
  return parseFloat(s) || 0;
}
function readBudDOM() {
  var m = mk();
  if (!S.budgets[m]) S.budgets[m] = {};
  if (!S.notes[m]) S.notes[m] = {};
  // Read disponible shared field
  var dispEl = document.getElementById("disp_input");
  if (dispEl) {
    if (!S.disponible) S.disponible = {};
    S.disponible[m] = evalExpr(dispEl.value);
  }
  document.querySelectorAll(".ni").forEach(function(inp) {
    var uid = inp.dataset.uid, cat = inp.dataset.cat;
    if (!uid || !cat) return;
    if (!S.budgets[m][uid]) S.budgets[m][uid] = {};
    S.budgets[m][uid][cat] = evalExpr(inp.value);
  });
  document.querySelectorAll(".note-i").forEach(function(ta) {
    var uid = ta.dataset.un, cat = ta.dataset.cn;
    if (!uid || !cat) return;
    if (!S.notes[m][uid]) S.notes[m][uid] = {};
    S.notes[m][uid][cat] = ta.value;
  });
}
// Disponible field handlers
function onDispChg() { readBudDOM(); }
function onDispBlur() {
  var m = mk(); var dispEl = document.getElementById("disp_input");
  if (dispEl) {
    var val = evalExpr(dispEl.value);
    if (!S.disponible) S.disponible = {};
    S.disponible[m] = val;
    dispEl.value = val || "";
  }
  readBudDOM(); render();
}

var _deb;
function onBudChg() {
  readBudDOM(); // update state immediately, no re-render (no flicker)
}
function onBudBlur() {
  readBudDOM(); render(); // update consolidado only when leaving field
}

window.saveBuds = function() {
  readBudDOM();
  var us = allUsers(); var m = mk();
  var saves = us.map(function(u) {
    return fbSet("budgets", m + "_" + u.id, { data: S.budgets[m][u.id] || {} })
      .then(function() { return fbSet("notes", m + "_" + u.id, { data: S.notes[m][u.id] || {} }); });
  });
  // Save shared disponible field
  var disp = (S.disponible && S.disponible[m]) || 0;
  var raisingData = S.raising[m] || {};
  saves.push(fbSet("budgets", m + "_shared", { disponible: disp, raising: raisingData }));
  Promise.all(saves).then(function() { toast("Presupuesto guardado &#10003;"); });
};

window.loadPrevBud = function() {
  var yr = S.selYear, mo = S.selMonth;
  if (mo === 0) { yr--; mo = 11; } else { mo--; }
  var pmk = yr + "-" + String(mo + 1).padStart(2, "0");
  var us = allUsers();
  Promise.all(us.map(function(u) {
    return Promise.all([fbGet("budgets", pmk + "_" + u.id), fbGet("notes", pmk + "_" + u.id)])
      .then(function(r) {
        var m = mk();
        if (!S.budgets[m]) S.budgets[m] = {};
        if (!S.notes[m]) S.notes[m] = {};
        if (r[0] && r[0].data) S.budgets[m][u.id] = Object.assign({}, r[0].data);
        if (r[1] && r[1].data) S.notes[m][u.id] = Object.assign({}, r[1].data);
      });
  })).then(function() { toast("Mes anterior cargado. Pulsa Guardar para aplicar."); render(); });
};

// ═══ HISTORY / TOOLTIP ═════════════════════════════════════════════════════
function prevMKs(n) {
  var keys = []; var yr = S.selYear, mo = S.selMonth;
  for (var i = 0; i < n; i++) {
    if (mo === 0) { yr--; mo = 11; } else { mo--; }
    keys.push({ key: yr + "-" + String(mo + 1).padStart(2, "0"), label: MONTHS[mo] + " " + yr });
  }
  return keys;
}

function ensureHistLoaded(n) {
  var pks = prevMKs(n); var us = allUsers(); var loads = [];
  if (!S._hl) S._hl = {};
  pks.forEach(function(pk) {
    us.forEach(function(u) {
      if (!S._hl[pk.key + "_tx_" + u.id]) {
        S._hl[pk.key + "_tx_" + u.id] = true;
        if (!S.transactions[pk.key]) S.transactions[pk.key] = {};
        loads.push(fbGet("transactions", pk.key + "_" + u.id).then(function(d) { S.transactions[pk.key][u.id] = d && d.list ? d.list : []; }));
      }
      if (!S._hl[pk.key + "_bu_" + u.id]) {
        S._hl[pk.key + "_bu_" + u.id] = true;
        if (!S.budgets[pk.key]) S.budgets[pk.key] = {};
        loads.push(fbGet("budgets", pk.key + "_" + u.id).then(function(d) { S.budgets[pk.key][u.id] = d && d.data ? d.data : {}; }));
      }
    });
  });
  return Promise.all(loads);
}

function buildTT(uid, catId) {
  var pks = prevMKs(3);
  var rows = pks.map(function(pk) {
    var bud = +((S.budgets[pk.key] && S.budgets[pk.key][uid] && S.budgets[pk.key][uid][catId]) || 0);
    var txs = (S.transactions[pk.key] && S.transactions[pk.key][uid]) || [];
    var spent = txs.filter(function(t) { return t.categoryId === catId && t.amount < 0 && t.categoryId !== "ignorar" && !t.deleted; })
      .reduce(function(s, t) { return s + Math.abs(t.amount); }, 0);
    return { label: pk.label, bud: bud, spent: spent };
  });
  var hasAny = rows.some(function(r) { return r.bud > 0 || r.spent > 0; });
  if (!hasAny) return "<span style=\"color:rgba(255,255,255,.5);font-style:italic\">Sin datos previos</span>";
  var hdr = "<div style=\"display:grid;grid-template-columns:auto 1fr 1fr;gap:3px 12px;font-size:11px;color:rgba(255,255,255,.5);margin-bottom:6px\">"
    + "<span></span><span>Pres.</span><span>Real</span></div>";
  var body = rows.map(function(r) {
    var sc = r.bud > 0 && r.spent > r.bud ? "#f87171" : "#fff";
    return "<div style=\"display:grid;grid-template-columns:auto 1fr 1fr;gap:3px 12px;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.1);font-size:12px\">"
      + "<span style=\"color:rgba(255,255,255,.55)\">" + r.label + "</span>"
      + "<span style=\"color:#93c5fd;font-weight:600;text-align:right\">" + (r.bud > 0 ? euro(r.bud) : "&#8212;") + "</span>"
      + "<span style=\"color:" + sc + ";font-weight:600;text-align:right\">" + (r.spent > 0 ? euro(r.spent) : "&#8212;") + "</span>"
      + "</div>";
  }).join("");
  var wb = rows.filter(function(r) { return r.bud > 0; }); var ws = rows.filter(function(r) { return r.spent > 0; });
  var ab = wb.length ? wb.reduce(function(s, r) { return s + r.bud; }, 0) / wb.length : 0;
  var as = ws.length ? ws.reduce(function(s, r) { return s + r.spent; }, 0) / ws.length : 0;
  var foot = "<div style=\"display:grid;grid-template-columns:auto 1fr 1fr;gap:3px 12px;margin-top:6px;padding-top:4px;font-size:12px;font-weight:700\">"
    + "<span style=\"color:rgba(255,255,255,.55)\">Media</span>"
    + "<span style=\"color:#93c5fd;text-align:right\">" + (ab > 0 ? euro(ab) : "&#8212;") + "</span>"
    + "<span style=\"color:#4ade80;text-align:right\">" + (as > 0 ? euro(as) : "&#8212;") + "</span>"
    + "</div>";
  return hdr + body + foot;
}

// Detect ING/Imagin format: rows 0-2 metadata, row 3 header with SUBCATEGORIA
// Skip redondeo movements (ING rounding feature)
function isRedondeo(r) {
  var subcat = String(r[2] == null ? "" : r[2]).toLowerCase();
  var desc   = String(r[3] == null ? "" : r[3]).toLowerCase();
  return subcat.includes("redondeo") || desc.includes("redondeo");
}

function detectFmt(rows) {
  for (var i = 0; i < Math.min(rows.length, 6); i++) {
    var r = rows[i]; if (!r) continue;
    var vals = r.map(function(v) { return String(v == null ? "" : v).toUpperCase(); });
    if (vals.some(function(v) { return v.includes("SUBCATEGOR"); })) {
      return { headerRow: i, dateCol: 0, catCol: 1, subcatCol: 2, descCol: 3, amountCol: 5 };
    }
  }
  return null;
}

function parseRows(uid, rows) {
  var fmt = detectFmt(rows);
  if (fmt) {
    return rows.slice(fmt.headerRow + 1)
      .filter(function(r) { return r && r.some(function(c) { return c != null && c !== ""; }) && !isRedondeo(r); })
      .map(function(r, i) {
        var rawAmt = r[fmt.amountCol];
        var amt = typeof rawAmt === "number" ? rawAmt : parseFloat(String(rawAmt || "0").replace(/\./g, "").replace(",", ".")) || 0;
        var dv = r[fmt.dateCol]; var ds = "";
        if (dv instanceof Date) ds = dv.getFullYear() + "-" + String(dv.getMonth()+1).padStart(2,"0") + "-" + String(dv.getDate()).padStart(2,"0");
        else if (dv) ds = String(dv).slice(0, 10);
        return { id: uid + "_i_" + Date.now() + "_" + i, userId: uid, date: ds, bankCat: String(r[fmt.catCol] || ""), subcategory: String(r[fmt.subcatCol] || ""), description: String(r[fmt.descCol] || ""), amount: amt, categoryId: null };
      }).filter(function(t) { return t.description || t.amount; });
  }
  var h = (rows[0] || []).map(function(x) { return String(x || "").toLowerCase(); });
  var dI = h.findIndex(function(x) { return x.includes("fech") || x.includes("date"); });
  var dsI = h.findIndex(function(x) { return x.includes("concepto") || x.includes("descri"); });
  var aI = h.findIndex(function(x) { return x.includes("importe") || x.includes("amount") || x.includes("monto"); });
  return rows.slice(1).filter(function(r) { return r && r.some(function(c) { return c != null && c !== ""; }) && !isRedondeo(r); })
    .map(function(r, i) {
      var ra = aI >= 0 ? r[aI] : null;
      var amt = typeof ra === "number" ? ra : parseFloat(String(ra || "0").replace(",", ".")) || 0;
      return { id: uid + "_i_" + Date.now() + "_" + i, userId: uid, date: dI >= 0 ? String(r[dI] || "") : "", bankCat: "", subcategory: "", description: dsI >= 0 ? String(r[dsI] || "") : String(r[1] || ""), amount: amt, categoryId: null };
    }).filter(function(t) { return t.description || t.amount; });
}

var _xlsxReady = false; var _xlsxCbs = [];
function needXLSX(cb) {
  if (_xlsxReady) { cb(); return; }
  _xlsxCbs.push(cb);
  if (_xlsxCbs.length > 1) return;
  var s = document.createElement("script");
  s.src = "https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js";
  s.onload = function() { _xlsxReady = true; _xlsxCbs.forEach(function(f) { f(); }); _xlsxCbs = []; };
  s.onerror = function() { toast("No se pudo cargar el lector de Excel. Comprueba tu conexion.", false); _xlsxCbs = []; };
  document.head.appendChild(s);
}

// Normalize a transaction amount to a rounded string key for deduplication
function amtKey(amt) { return parseFloat(parseFloat(amt).toFixed(2)).toString(); }
// Build dedup key: date + description + rounded amount
function txKey(t) { return (t.date||"") + "|" + (t.description||"").trim() + "|" + amtKey(t.amount||0); }

function importFile(uid, e) {
  var file = e.target.files[0]; if (!file) return;
  S.importing[uid] = true; render();
  needXLSX(function() {
    var reader = new FileReader();
    reader.onload = function(ev) {
      try {
        var wb = XLSX.read(ev.target.result, { type: "array", cellDates: true });
        var ws = wb.Sheets[wb.SheetNames[0]];
        var rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null, raw: true });
        var parsed = parseRows(uid, rows);

        var m = mk();
        if (!S.transactions[m]) S.transactions[m] = {};
        var existing = S.transactions[m][uid] || [];

        // Build seen and deleted sets using normalized keys
        var seen = {};
        existing.forEach(function(t) { seen[txKey(t)] = t; });
        var deletedSet = {};
        existing.filter(function(t){ return t.deleted; }).forEach(function(t){ deletedSet[txKey(t)] = 1; });

        // Only add transactions that are truly new (not seen and not deleted)
        // NEVER overwrite existing categories — if a tx is already in Firebase, skip it entirely
        var newOnes = parsed.filter(function(t) {
          var k = txKey(t);
          return !seen[k] && !deletedSet[k];
        });

        // newOnes arrive with no category — user will assign manually
        S.transactions[m][uid] = existing.concat(newOnes);
        saveTxU(uid);
        S.importing[uid] = false;
        toast(newOnes.length + " nuevos movimientos importados" + (parsed.length - newOnes.length > 0 ? " (" + (parsed.length - newOnes.length) + " ya existian, ignorados)" : "") + ".");
        render();
      } catch (err) { console.error(err); S.importing[uid] = false; toast("Error al leer el archivo: " + err.message, false); render(); }
      e.target.value = "";
    };
    reader.readAsArrayBuffer(file);
  });
}

  S.transactions[m][uid] = (S.transactions[m][uid] || []).map(function(t) {
    if (t.id !== txId) return t;

    changed = true;
    return Object.assign({}, t, { note: val });
  });

function resolveCatId(val) {
  if (!val) return "";
  // direct id match
  var byId = CATS.find(function(c) { return c.id === val; });
  if (byId) return byId.id;
  if (val === "ignorar" || val === "x Ignorar") return "ignorar";
  // name match
  var byName = CATS.find(function(c) { return c.name.toLowerCase() === val.toLowerCase(); });
  if (byName) return byName.id;
  // partial
  var partial = CATS.find(function(c) { return c.name.toLowerCase().includes(val.toLowerCase()); });
  if (partial) return partial.id;
  return "";
}

        var pct = bu > 0 ? Math.min(sp / bu * 100, 100) : 0; var col2 = u.color || "#6366f1";
        return "<div>"
          + "<div style=\"font-size:11px;color:var(--tx3);margin-bottom:3px;font-weight:500\">" + u.name + "</div>"
          + "<div style=\"font-size:13px;font-weight:700;color:" + (sp > bu && bu > 0 ? "var(--red)" : "var(--tx)") + "\">" + euro(sp)
          + "<span style=\"color:var(--tx3);font-size:11px;font-weight:400\"> / " + euro(bu) + "</span></div>"
          + "<div class=\"bar-bg\"><div class=\"bar-fill\" style=\"width:" + pct + "%;background:" + col2 + "\"></div></div></div>";
      }).join("");
      var tBu = us.reduce(function(s, u) { return s + (+(getBud(u.id)[cat.id] || 0)); }, 0);
      var tSp = us.reduce(function(s, u) { return s + catSpent(u.id, cat.id); }, 0);
      var tPct = tBu > 0 ? Math.min(tSp / tBu * 100, 100) : 0;
      var conC = "<div>"
        + "<div style=\"font-size:11px;color:var(--teal);margin-bottom:3px;font-weight:600\">Total</div>"
        + "<div style=\"font-size:13px;font-weight:700;color:" + (tSp > tBu && tBu > 0 ? "var(--red)" : "var(--tx)") + "\">" + euro(tSp)
        + "<span style=\"color:var(--tx3);font-size:11px;font-weight:400\"> / " + euro(tBu) + "</span></div>"
        + "<div class=\"bar-bg\"><div class=\"bar-fill\" style=\"width:" + tPct + "%;background:var(--teal)\"></div></div></div>";
      html += "<div class=\"brk-card\">"
        + "<div class=\"brk-h\">" + cat.name + "</div>"
        + "<div class=\"brk-b\" style=\"grid-template-columns:repeat(" + (us.length + 1) + ",1fr)\">" + uCols + conC + "</div></div>";
    });
    html += "</div>";
  });
  return html + "</div>";
}

window.saveRaising = function(uid, val) {
  var m = mk();
  if (!S.raising[m]) S.raising[m] = {};
  S.raising[m][uid] = evalExpr(val) || 0;
  // Persist: read current shared doc and update
  var disp = (S.disponible && S.disponible[m]) || 0;
  fbSet("budgets", m + "_shared", { disponible: disp, raising: S.raising[m] });
  render();
};

window.genAdv = function() {
  S.adviceLoading = true; S.adviceText = ""; render();
  var us = allUsers();
  var rd = S.raising[mk()] || {};
  var data = us.map(function(u) {
    var b = getBud(u.id); var cs = {};
    getTx(u.id).forEach(function(t) { if (t.categoryId && t.amount < 0) cs[t.categoryId] = (cs[t.categoryId] || 0) + Math.abs(t.amount); });
    return { persona: u.name, ahorro_raising: +(rd[u.id] || 0), resumen: CATS.map(function(c) { return { cat: c.name, pres: +(b[c.id] || 0), gast: cs[c.id] || 0 }; }).filter(function(x) { return x.pres > 0 || x.gast > 0; }) };
  });
  var totalRaising = us.reduce(function(s, u) { return s + (+(rd[u.id] || 0)); }, 0);
  fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json", "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true", "x-api-key": ANTHROPIC_KEY },
    body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: 1200,
      system: "Eres un asesor financiero personal amigable para una pareja espanola. Da 5 consejos concretos en espanol. Cada consejo: emoji + **titulo en negrita** + 2-3 frases.",
      messages: [{ role: "user", content: "Mes: " + mk() + "\nTotal ahorrado en Raising: " + totalRaising + "\u20ac\n" + JSON.stringify(data, null, 2) }] })
  }).then(function(r) { return r.json(); }).then(function(d) {
    console.log("[Consejos] API response:", JSON.stringify(d).slice(0, 300));
    if (d.error) {
      S.adviceText = "Error API: " + d.error.message;
    } else if (d.content && d.content.length > 0) {
      S.adviceText = d.content.map(function(b) { return b.text || ""; }).join("").trim();
    } else {
      S.adviceText = "Respuesta vac\u00eda. Revisa la consola para m\u00e1s detalles.";
    }
    S.adviceLoading = false; render();
  }).catch(function(e) {
    console.error("[Consejos] fetch error:", e);
    S.adviceText = "Error de conexi\u00f3n: " + (e&&e.message||"desconocido");
    S.adviceLoading = false; render();
  });
};

function esc(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

function loadMonthData() {
  var us = allUsers(); var m = mk();
  if (!S.budgets[m]) S.budgets[m] = {};
  if (!S.notes[m]) S.notes[m] = {};
  if (!S.transactions[m]) S.transactions[m] = {};
  if (!S.disponible) S.disponible = {};
  var loads = us.map(function(u) {
    return Promise.all([
      fbGet("budgets", m + "_" + u.id).then(function(d) { S.budgets[m][u.id] = d && d.data ? d.data : {}; }),
      fbGet("notes", m + "_" + u.id).then(function(d) { S.notes[m][u.id] = d && d.data ? d.data : {}; }),
      fbGet("transactions", m + "_" + u.id).then(function(d) { S.transactions[m][u.id] = d && d.list ? d.list : []; })
    ]);
  });
  // Load shared disponible + raising
  loads.push(fbGet("budgets", m + "_shared").then(function(d) {
    S.disponible[m] = d && d.disponible ? +d.disponible : 0;
    if (!S.raising[m]) S.raising[m] = {};
    if (d && d.raising) {
      Object.keys(d.raising).forEach(function(k){ S.raising[m][k] = +d.raising[k]; });
    }
  }));
  return Promise.all(loads);
}

var SEED_MK = "2026-03";

function seedOrseData(orseId) {
  // Check if already seeded
  return fbGet("budget", "seed_done_" + SEED_MK).then(function(d) {
    if (d && d.done) return; // already seeded
    // Stamp userId
    var txs = SEED_TXS.map(function(t) { return Object.assign({}, t, { userId: orseId }); });
    // Merge with any existing
    return fbGet("transactions", SEED_MK + "_" + orseId).then(function(existing) {
      var existList = existing && existing.list ? existing.list : [];
      var seen = {}; existList.forEach(function(t) { seen[t.id] = 1; });
      var newOnes = txs.filter(function(t) { return !seen[t.id]; });
      if (newOnes.length === 0) return;
      var merged = existList.concat(newOnes);
      return fbSet("transactions", SEED_MK + "_" + orseId, { list: merged })
        .then(function() { return fbSet("budget", "seed_done_" + SEED_MK, { done: true }); });
    });
  });
}

fbGet("budget", "users").then(function(r) {
  if (r) S.users = r;
  return Promise.all(allUsers().map(function(u) {
    return fbGet("budget", "rules_" + u.id).then(function(d) { if (d) S.rules[u.id] = d; });
  }));
}).then(function() {
  return loadMonthData();
}).then(function() {
  var sess = localStorage.getItem("bsess");
  if (sess && S.users[sess]) S.user = S.users[sess];
  // Find Orse user (first registered, or by name)
  var orseUser = allUsers().find(function(u) { return u.name && u.name.toLowerCase().includes("orse"); });
  if (!orseUser) orseUser = allUsers()[0]; // fallback to first user
  if (orseUser) {
    seedOrseData(orseUser.id).then(function() {
      // Reload month data after seed
      return loadMonthData();
    }).then(function() {
      render();
    }).catch(function(e) { console.warn("Seed error", e); render(); });
  }
  document.getElementById("ls").style.display = "none";
  document.getElementById("app").style.display = "block";
  render();
  if (S.tab === "budget") ensureHistLoaded(3).then(function() { render(); });
}).catch(function(e) {
  console.error("Init error", e);
  var el = document.getElementById("le");
  if (el) { el.innerHTML = "Error al conectar: " + e.message + "<br><br><button onclick='location.reload()' style='padding:9px 18px;background:#0071e3;color:#fff;border:none;border-radius:8px;cursor:pointer'>Reintentar</button>"; el.style.display = "block"; }
